            document.getElementById('page-home').style.display = 'none';
            document.getElementById('page-nilaiku').style.display = 'none';
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-nilaiku').classList.remove('active');

            if(page === 'home') {
                document.getElementById('page-home').style.display = 'block';
                document.getElementById('nav-home').classList.add('active');
                renderHomeStats();
            } else {
                document.getElementById('page-nilaiku').style.display = 'block';
                document.getElementById('nav-nilaiku').classList.add('active');
            }
        }

        // 4. RENDER STATISTIK KELAS (HOME)
        function renderHomeStats() {
            let totalMat = 0, totalInd = 0;
            let countMat = { Baik: 0, Memadai: 0, Kurang: 0 };
            let countInd = { Baik: 0, Memadai: 0, Kurang: 0 };

            students.forEach(s => {
                totalMat += s.mat;
                totalInd += s.ind;
                if(countMat[s.matPred] !== undefined) countMat[s.matPred]++;
                if(countInd[s.indPred] !== undefined) countInd[s.indPred]++;
            });

            const totalSiswa = students.length;
            document.getElementById('avg-class-mat').innerText = (totalMat / totalSiswa).toFixed(2);
            document.getElementById('avg-class-ind').innerText = (totalInd / totalSiswa).toFixed(2);

            // Update Chart BARS
            const updateBar = (mapel, kategori, val) => {
                const pct = ((val / totalSiswa) * 100).toFixed(1);
                document.getElementById(`pct-${mapel}-${kategori.toLowerCase()}`).innerText = `${pct}%`;
                document.getElementById(`bar-${mapel}-${kategori.toLowerCase()}`).style.width = `${pct}%`;
            };

            updateBar('mat', 'Baik', countMat.Baik);
            updateBar('mat', 'Memadai', countMat.Memadai);
            updateBar('mat', 'Kurang', countMat.Kurang);

            updateBar('ind', 'Baik', countInd.Baik);
            updateBar('ind', 'Memadai', countInd.Memadai);
            updateBar('ind', 'Kurang', countInd.Kurang);
        }

        // 5. FUNGSI PENCARIAN & EFEK KEJUTAN (NILAIKU)
        function searchStudent() {
            const query = document.getElementById('searchInput').value.trim().toUpperCase();
            if (query.length < 2) {
                alert("Ketik minimal 2 huruf untuk mencari!");
                return;
            }

            // UI State adjustments
            const resultArea = document.getElementById('result-area');
            const loader = document.getElementById('loading-screen');
            
            resultArea.style.display = 'none';
            resultArea.innerHTML = '';
            loader.style.display = 'block';

            // Dramatisasi Loading (1.2 detik)
            setTimeout(() => {
                loader.style.display = 'none';
                const results = students.filter(s => s.nama.toUpperCase().includes(query));

                if(results.length === 0) {
                    resultArea.innerHTML = `<div class="m3-glass" style="text-align:center; color:#64748b;">Data tidak ditemukan. Coba ketik nama panggilan lain.</div>`;
                } else {
                    results.forEach(s => {
                        let rankClass = 'rank-other';
                        let badgeIcon = '<i class="fa-solid fa-hashtag"></i>';
                        let badgeClass = 'badge-other';

                        if(s.rank === 1) { 
                            rankClass = 'rank-1'; badgeIcon = '<i class="fa-solid fa-trophy"></i>'; badgeClass = 'badge-1'; 
                        } else if(s.rank === 2) { 
                            rankClass = 'rank-2'; badgeIcon = '<i class="fa-solid fa-medal"></i>'; badgeClass = 'badge-2'; 
                        } else if(s.rank === 3) { 
                            rankClass = 'rank-3'; badgeIcon = '<i class="fa-solid fa-medal"></i>'; badgeClass = 'badge-3'; 
                        }

                        const card = `
                            <div class="student-card ${rankClass}">
                                <div class="card-header">
                                    <div class="student-name">${s.nama}</div>
                                    <div class="badge ${badgeClass}">${badgeIcon} Rank ${s.rank}</div>
                                </div>

                                <div class="score-row">
                                    <div class="score-info">
                                        <div class="subject-name">Matematika</div>
                                        <div class="category-tag tag-${s.matPred.toLowerCase()}">${s.matPred}</div>
                                    </div>
                                    <div class="score-number">${s.mat.toFixed(2)}</div>
                                </div>

                                <div class="score-row">
                                    <div class="score-info">
                                        <div class="subject-name">Bahasa Indonesia</div>
                                        <div class="category-tag tag-${s.indPred.toLowerCase()}">${s.indPred}</div>
                                    </div>
                                    <div class="score-number">${s.ind.toFixed(2)}</div>
                                </div>

                                <div class="card-footer">
                                    <span style="font-size:13px; color:#64748b; display:block; margin-bottom:4px;">Rata-Rata Kombinasi</span>
                                    <span class="avg-score">${s.avg}</span>
                                </div>
                            </div>
                        `;
                        resultArea.innerHTML += card;
                    });
                }
                resultArea.style.display = 'block';
            }, 1200);
        }

        // Trigger pencarian saat tekan Enter di keyboard
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                searchStudent();
            }
        });
    </script>
</body>
</html>
