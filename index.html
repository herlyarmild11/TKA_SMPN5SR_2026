<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rekapitulasi Nilai TKA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

        /* === RESET & VARIABEL TEMA === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f0f7ff; /* Biru sangat tipis, bersih, lembut */
            color: #1e293b;
            min-height: 100vh;
        }

        /* === MOBILE CONTAINER === */
        #app-container {
            max-width: 440px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding: 24px 20px 84px 20px; /* Padding bawah untuk Navbar */
            overflow-x: hidden;
        }

        /* === GLASSMORPHISM MATERIAL 3 === */
        .m3-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        /* === HEADER / JUDUL === */
        .page-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }
        .page-header p {
            font-size: 13px;
            color: #64748b;
        }

        /* === BOTTOM NAVBAR === */
        .bottom-navbar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            height: 64px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            text-decoration: none;
            width: 50%;
            height: 100%;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 600;
        }

        .nav-item.active {
            color: #3b82f6;
        }

        /* === HALAMAN (TAMPIL/SEMBUNYI) === */
        .page-section {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        .page-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === HALAMAN NILAiku (PENCARIAN) === */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            color: #1e293b;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-search {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .btn-search:active {
            transform: scale(0.95);
        }

        /* === LOADING DRAMATIS === */
        #loadingState {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .spinner {
            font-size: 36px;
            color: #3b82f6;
            margin-bottom: 16px;
        }
        .pulse-text {
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        /* === KARTU HASIL (SURPRISE EFFECT) === */
        .result-card {
            padding: 20px;
            margin-bottom: 16px;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.3);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.95); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* === TEMA PERINGKAT === */
        /* Rank 1 */
        .rank-1 {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 2px solid #34d399;
            box-shadow: 0 8px 25px rgba(52, 211, 153, 0.3);
            background-size: 200% 200%;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, shimmer 3s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Rank 2 */
        .rank-2 {
            background: linear-gradient(135deg, #dbaefe, #bfdbfe);
            border: 2px solid #93c5fd;
        }
        /* Rank 3 */
        .rank-3 {
            background: linear-gradient(135deg, #ffedd5, #fdbb74);
            border: 2px solid #fb923c;
        }

        /* === LAYOUT KARTU KONTEN === */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
            padding-bottom: 12px;
        }
        .student-name {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .student-nisn {
            font-size: 11px;
            color: #64748b;
        }
        .rank-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.7);
            font-weight: 700;
            font-size: 13px;
        }

        /* BARIS MAPEL (ANTI-NABRAK) */
        .subject-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.5);
            padding: 12px 14px;
            border-radius: 16px;
            margin-bottom: 10px;
        }
        .subj-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .subj-name {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }
        .cat-tag {
            width: auto;
            align-self: flex-start;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .score-num {
            font-size: 22px;
            font-weight: 800;
            color: #0f172a;
            flex-shrink: 0; /* Mencegah angka mengecil */
        }

        /* Warna Predikat */
        .bg-baik { background: #d1fae5; color: #065f46; }
        .bg-memadai { background: #dbeafe; color: #1e40af; }
        .bg-kurang { background: #fee2e2; color: #991b1b; }

        .card-footer {
            margin-top: 16px;
            text-align: center;
            padding-top: 12px;
            border-top: 1px dashed rgba(0,0,0,0.1);
        }
        .avg-score {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
        }
        .avg-score span {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
        }

        /* === HALAMAN HOME (STATISTIK) === */
        .stat-box {
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .stat-title {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #3b82f6;
        }

        .chart-container {
            padding: 16px;
            margin-bottom: 16px;
        }
        .chart-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1e293b;
        }
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        .bar-label {
            width: 60px;
            font-size: 11px;
            font-weight: 600;
            color: #475569;
        }
        .bar-track {
            flex: 1;
            height: 12px;
            background: rgba(0,0,0,0.05);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1s ease-in-out;
            width: 0%; /* Diisi via JS */
        }
        .fill-baik { background: #34d399; }
        .fill-memadai { background: #60a5fa; }
        .fill-kurang { background: #f87171; }
        .bar-count {
            width: 20px;
            font-size: 12px;
            font-weight: 700;
            text-align: right;
            color: #1e293b;
        }

        /* Helper jika pencarian kosong */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="app-container">

            ["MUHAMMAD ABDUL ELGANI", "0116757394", 56.67, "Baik", 33.33, "Kurang"]
        ];

        // === 2. INISIALISASI & LOGIKA PERINGKAT ===
        let students = [];
        let stats = {
            matTotal: 0, indoTotal: 0,
            matCount: { Baik: 0, Memadai: 0, Kurang: 0 },
            indoCount: { Baik: 0, Memadai: 0, Kurang: 0 }
        };

        function initData() {
            // Mapping array mentah ke Object, lalu kalkulasi rata-rata
            students = rawData.map(item => {
                let s = {
                    nama: item[0].trim(),
                    nisn: item[1],
                    mat: item[2],
                    matCat: item[3].trim(),
                    indo: item[4],
                    indoCat: item[5].trim()
                };
                s.avg = ((s.mat + s.indo) / 2).toFixed(2);
                
                // Kumpulkan data statistik
                stats.matTotal += s.mat;
                stats.indoTotal += s.indo;
                stats.matCount[s.matCat]++;
                stats.indoCount[s.indoCat]++;

                return s;
            });

            // Urutkan berdasarkan rata-rata tertinggi ke terendah
            students.sort((a, b) => parseFloat(b.avg) - parseFloat(a.avg));

            // Tetapkan Peringkat (Rank)
            students.forEach((s, index) => {
                s.rank = index + 1;
            });

            renderHomeStats();
        }

        // === 3. RENDER STATISTIK HOME ===
        function renderHomeStats() {
            let totalSiswa = students.length;
            document.getElementById('avgMatClass').innerText = (stats.matTotal / totalSiswa).toFixed(2);
            document.getElementById('avgIndoClass').innerText = (stats.indoTotal / totalSiswa).toFixed(2);

            const buildChart = (countObj) => {
                let html = '';
                const categories = [
                    { label: 'Baik', key: 'Baik', fill: 'fill-baik' },
                    { label: 'Memadai', key: 'Memadai', fill: 'fill-memadai' },
                    { label: 'Kurang', key: 'Kurang', fill: 'fill-kurang' }
                ];
                categories.forEach(c => {
                    let pct = (countObj[c.key] / totalSiswa) * 100;
                    html += `
                        <div class="bar-row">
                            <span class="bar-label">${c.label}</span>
                            <div class="bar-track">
                                <div class="bar-fill ${c.fill}" style="width: ${pct}%;"></div>
                            </div>
                            <span class="bar-count">${countObj[c.key]}</span>
                        </div>
                    `;
                });
                return html;
            };

            document.getElementById('chartMat').innerHTML = buildChart(stats.matCount);
            document.getElementById('chartIndo').innerHTML = buildChart(stats.indoCount);
        }

        // === 4. LOGIKA PENCARIAN & SURPRISE EFFECT ===
        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim().toUpperCase();
            if (query.length < 2) {
                alert('Tolong ketik minimal 2 huruf nama lu bro!');
                return;
            }

            const resultArea = document.getElementById('resultArea');
            const loadingState = document.getElementById('loadingState');

            // Hapus hasil lama, tampilkan loading dramatis
            resultArea.innerHTML = '';
            loadingState.style.display = 'flex';

            // Efek Loading 1,2 Detik (Ketegangan Positif)
            setTimeout(() => {
                const results = students.filter(s => s.nama.toUpperCase().includes(query));
                loadingState.style.display = 'none';

                if (results.length === 0) {
                    resultArea.innerHTML = `<div class="empty-state m3-glass"><i class="fa-solid fa-box-open" style="font-size:32px; color:#94a3b8; margin-bottom:12px;"></i><br>Yah, nama "${query}" tidak ditemukan di daftar kelas. Coba ketik nama panggilan lain bro!</div>`;
                    return;
                }

                let htmlContent = '';
                results.forEach(s => {
                    // Penentuan Tema Kartu berdasarkan Rank
                    let rankClass = "m3-glass"; // Default Rank 4 ke bawah
                    let rankIcon = `<i class="fa-solid fa-hashtag" style="color: #64748b;"></i> ${s.rank}`;
                    
                    if (s.rank === 1) {
                        rankClass = "m3-glass rank-1";
                        rankIcon = `<i class="fa-solid fa-trophy" style="color: #f59e0b;"></i> Juara 1`;
                    } else if (s.rank === 2) {
                        rankClass = "m3-glass rank-2";
                        rankIcon = `<i class="fa-solid fa-medal" style="color: #3b82f6;"></i> Juara 2`;
                    } else if (s.rank === 3) {
                        rankClass = "m3-glass rank-3";
                        rankIcon = `<i class="fa-solid fa-medal" style="color: #ea580c;"></i> Juara 3`;
                    }

                    const getCatClass = (cat) => {
                        if (cat === 'Baik') return 'bg-baik';
                        if (cat === 'Memadai') return 'bg-memadai';
                        return 'bg-kurang';
                    };

                    htmlContent += `
                        <div class="result-card ${rankClass}">
                            <div class="card-header">
                                <div>
                                    <div class="student-name">${s.nama}</div>
                                    <div class="student-nisn">NISN: ${s.nisn}</div>
                                </div>
                                <div class="rank-badge">
                                    ${rankIcon}
                                </div>
                            </div>

                            <div class="subject-row">
                                <div class="subj-left">
                                    <div class="subj-name">Matematika</div>
                                    <div class="cat-tag ${getCatClass(s.matCat)}">${s.matCat}</div>
                                </div>
                                <div class="score-num">${s.mat.toFixed(2)}</div>
                            </div>

                            <div class="subject-row">
                                <div class="subj-left">
                                    <div class="subj-name">B. Indonesia</div>
                                    <div class="cat-tag ${getCatClass(s.indoCat)}">${s.indoCat}</div>
                                </div>
                                <div class="score-num">${s.indo.toFixed(2)}</div>
                            </div>

                            <div class="card-footer">
                                <div class="avg-score">Rata-Rata Kombinasi: <br><span>${s.avg}</span></div>
                            </div>
                        </div>
                    `;
                });

                resultArea.innerHTML = htmlContent;
            }, 1200); // 1.2 detik
        }

        // Jalankan pencarian jika tombol Enter ditekan pada keyboard ponsel
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleSearch();
        });

        // === 5. NAVIGASI TAB MENU ===
        function switchTab(tabName) {
            // Reset state navigasi aktif
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav${tabName}`).classList.add('active');

            // Sembunyikan semua page & header
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            document.getElementById('headerNilaiku').classList.remove('active');
            document.getElementById('headerHome').classList.remove('active');

            // Tampilkan page yang dipilih
            document.getElementById(`page${tabName}`).classList.add('active');
            document.getElementById(`header${tabName}`).classList.add('active');
        }

        // Jalankan saat aplikasi pertama dimuat
        window.onload = initData;

    </script>
</body>
</html>
